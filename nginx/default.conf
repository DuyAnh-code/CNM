# ─────────────────────────────────────────────────────────────
# Nginx — Reverse Proxy cho PetPals Shop
# ─────────────────────────────────────────────────────────────
# HƯỚNG DẪN: Thay YOUR_DOMAIN.COM bằng domain thực của bạn
# Ví dụ: petpals.example.com
# ─────────────────────────────────────────────────────────────

# ─── Rate limiting ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# ─── Upstream ───────────────────────────────────────────────
upstream nextjs {
    server web:3000;
}

# ─── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN.COM;

    # Certbot challenge (cần cho lần đầu cấp SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tất cả HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.COM;

    # SSL certificates (do Certbot quản lý)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Upload size limit (cho file upload)
    client_max_body_size 10M;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;

    # ─── Proxy to Next.js ──────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── Cache static assets ───────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
